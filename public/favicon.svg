<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="acordex-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#10b981" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#acordex-bg)" />
  
  <!-- Stylized Guitar / Musical Note Icon -->
  <g filter="url(#glow)">
    <path d="M192 384 V160 L352 112 V336" stroke="#090d16" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <circle cx="144" cy="384" r="48" fill="#090d16" />
    <circle cx="304" cy="336" r="48" fill="#090d16" />
    
    <!-- Accent Fret Line -->
    <path d="M192 224 L352 176" stroke="#ffffff" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>
